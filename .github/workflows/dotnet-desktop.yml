name: Release Build & Publish

on:
  push:
    branches: [ "release" ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "10.0.x"

    - name: Bump version
      id: version
      shell: powershell
      run: |
        $versionFile = "version.json"
        $json = Get-Content $versionFile -Raw | ConvertFrom-Json
        $current = [Version]$json.version
        $new = "{0}.{1}.{2}" -f $current.Major, $current.Minor, ($current.Build + 1)
        $json.version = $new
        $json | ConvertTo-Json -Depth 10 | Set-Content $versionFile -Encoding UTF8
        Write-Host "Bumped version: $($current.ToString()) -> $new"
        echo "new_version=$new" >> $env:GITHUB_OUTPUT

    - name: Build (separate DLLs)
      shell: powershell
      run: |
        dotnet build src/BlackGoldAncientSword.App/BlackGoldAncientSword.App.csproj `
          -c Release `
          -r win-x64 `
          -o build/Release

    - name: Publish (self-contained single exe)
      shell: powershell
      run: |
        dotnet publish src/BlackGoldAncientSword.App/BlackGoldAncientSword.App.csproj `
          -c Release `
          -r win-x64 `
          -o publish/Release

    - name: Merge outputs
      shell: powershell
      run: |
        Copy-Item publish/Release/* build/Release/ -Recurse -Force
        Write-Host "Combined build folder contents:"
        Get-ChildItem build/Release | Select-Object Name, Length | Format-Table -AutoSize

    - name: Install Inno Setup
      shell: powershell
      run: |
        choco install innosetup -y

    - name: Build Installer
      shell: powershell
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

    - name: Commit bump, Tag & Push
      shell: powershell
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        $ver = '${{ steps.version.outputs.new_version }}'
        git add version.json
        git commit -m "chore: bump version to $ver [skip ci]"
        git tag "v$ver"
        git push origin HEAD:release
        git push origin "v$ver"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.new_version }}
        name: v${{ steps.version.outputs.new_version }}
        files: |
          output/*.exe
        draft: false
        prerelease: false
