name: Release Build & Publish

on:
  push:
    branches:
      - release
    branches-ignore:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "10.0.x"

    - name: Bump version
      id: version
      shell: powershell
      run: |
        $versionFile = "version.json"
        $json = Get-Content $versionFile -Raw | ConvertFrom-Json
        $current = [Version]$json.version
        $new = "{0}.{1}.{2}" -f $current.Major, $current.Minor, ($current.Build + 1)
        $json.version = $new
        $json | ConvertTo-Json -Depth 10 | Set-Content $versionFile -Encoding UTF8
        Write-Host "Bumped version: $($current.ToString()) -> $new"
        echo "new_version=$new" >> $env:GITHUB_OUTPUT

    - name: Build (separate DLLs)
      shell: powershell
      run: |
        dotnet build src/BlackGoldAncientSword.App/BlackGoldAncientSword.App.csproj `
          -c Release `
          -r win-x64 `
          -o build/Release

    - name: Publish (self-contained single exe)
      shell: powershell
      run: |
        dotnet publish src/BlackGoldAncientSword.App/BlackGoldAncientSword.App.csproj `
          -c Release `
          -r win-x64 `
          -o publish/Release

    - name: Merge outputs
      shell: powershell
      run: |
        Copy-Item publish/Release/* build/Release/ -Recurse -Force
        Write-Host "Combined build folder contents:"
        Get-ChildItem build/Release | Select-Object Name, Length | Format-Table -AutoSize

    - name: Zip published output
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path output | Out-Null
        $zipName = "BlackGoldAncientSword-v${{ steps.version.outputs.new_version }}.zip"
        Compress-Archive -Path publish/Release/* -DestinationPath "output/$zipName"
        Write-Host "Created: output/$zipName"

    - name: Install Inno Setup
      shell: powershell
      run: |
        choco install innosetup -y

    - name: Build Installer
      shell: powershell
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

    - name: Generate appcast.xml
      shell: powershell
      run: |
        $ver = '${{ steps.version.outputs.new_version }}'
        $pubDate = (Get-Date -Format "ddd, dd MMM yyyy HH:mm:ss zzz")
        $xml = @"
        <?xml version="1.0" encoding="UTF-8"?>
        <rss xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" version="2.0">
          <channel>
            <title>BlackGoldAncientSword</title>
            <item>
              <title>$ver</title>
              <sparkle:releaseNotesLink>https://github.com/${{ github.repository }}/releases/tag/v$ver</sparkle:releaseNotesLink>
              <pubDate>$pubDate</pubDate>
              <enclosure url="https://github.com/${{ github.repository }}/releases/download/v$ver/BlackGoldAncientSword-v$ver.zip"
                         sparkle:version="$ver"
                         length="0"
                         type="application/octet-stream"
                         sparkle:os="windows" />
            </item>
          </channel>
        </rss>
"@
        $xml.Trim() | Set-Content -Path "output/appcast.xml" -Encoding UTF8
        Write-Host "Generated appcast.xml for v$ver"

    - name: Commit bump, Tag & Push
      shell: powershell
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        $ver = '${{ steps.version.outputs.new_version }}'
        git add version.json
        git commit -m "chore: bump version to $ver [skip ci]"
        git tag "v$ver"
        git push origin HEAD:release
        git push origin "v$ver"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.new_version }}
        name: v${{ steps.version.outputs.new_version }}
        files: |
          output/*.exe
          output/*.zip
          output/appcast.xml
        draft: false
        prerelease: false
