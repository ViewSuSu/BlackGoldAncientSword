name: Release Build & Publish

on:
  push:
    branches:
      - release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Determine version from git tags
        id: version
        shell: powershell
        run: |
          $latestTag = git tag --sort=-v:refname | Where-Object { $_ -match '^v\d+\.\d+\.\d+$' } | Select-Object -First 1

          if (-not $latestTag) {
            $newVersion = "1.0.0"
            Write-Host "No existing version tags found. Starting at $newVersion"
          } else {
            $latestTag -match '^v(\d+\.\d+\.\d+)$' | Out-Null
            $current = [Version]$Matches[1]
            $newVersion = "{0}.{1}.{2}" -f $current.Major, $current.Minor, ($current.Build + 1)
            Write-Host "Latest tag: $latestTag -> candidate $newVersion"
            # Avoid collision if tag already exists
            $allTags = git tag
            while ($allTags -contains "v$newVersion") {
              $parts = [Version]$newVersion
              $newVersion = "{0}.{1}.{2}" -f $parts.Major, $parts.Minor, ($parts.Build + 1)
              Write-Host "Tag v$newVersion exists, bumped to $newVersion"
            }
          }

          "new_version=$newVersion" >> $env:GITHUB_OUTPUT

      - name: Build
        shell: powershell
        run: |
          $projPath = "src/BlackGoldAncientSword.App/BlackGoldAncientSword.App.csproj"
          dotnet build $projPath `
            -c Release `
            -r win-x64 `
            /p:Version=${{ steps.version.outputs.new_version }}
          Write-Host "Build completed"

      - name: Publish (self-contained)
        shell: powershell
        run: |
          $projPath = "src/BlackGoldAncientSword.App/BlackGoldAncientSword.App.csproj"
          dotnet publish $projPath `
            -c Release `
            -r win-x64 `
            -o publish/Release `
            --self-contained `
            /p:PublishSingleFile=true `
            /p:PublishReadyToRun=true `
            /p:Version=${{ steps.version.outputs.new_version }}
          Write-Host "Publish completed"

      - name: Merge build + publish output
        shell: powershell
        run: |
          $buildDir = "src/BlackGoldAncientSword.App/bin/Release/net10.0-windows/win-x64"
          $publishDir = "publish/Release"
          $mergedDir = "publish/Merged"

          New-Item -ItemType Directory -Force -Path $mergedDir | Out-Null

          # 1. Copy all build output as base
          Copy-Item -Path "$buildDir\*" -Destination $mergedDir -Recurse -Force
          Write-Host "Copied build output: $(Get-ChildItem $mergedDir -Recurse | Measure-Object).Count files"

          # 2. Overlay with publish output (publish wins on conflicts)
          Copy-Item -Path "$publishDir\*" -Destination $mergedDir -Recurse -Force
          Write-Host "Overlaid publish output: $(Get-ChildItem $mergedDir -Recurse | Measure-Object).Count files total"

      - name: Zip merged output
        id: zip
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path output | Out-Null

          $zipName = "BlackGoldAncientSword-v${{ steps.version.outputs.new_version }}.zip"
          $zipPath = "output/$zipName"

          Compress-Archive `
            -Path publish/Merged/* `
            -DestinationPath $zipPath `
            -Force

          $zipSize = (Get-Item $zipPath).Length
          "zip_name=$zipName" >> $env:GITHUB_OUTPUT
          "zip_size=$zipSize" >> $env:GITHUB_OUTPUT

          Write-Host "Created: $zipPath ($zipSize bytes)"

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup -y --no-progress --force

      - name: Download Inno Setup Chinese language file
        shell: powershell
        run: |
          $url = "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl"
          $dest = "C:\Program Files (x86)\Inno Setup 6\Languages\ChineseSimplified.isl"
          Invoke-WebRequest -Uri $url -OutFile $dest
          Write-Host "Downloaded ChineseSimplified.isl"

      - name: Build Installer
        shell: powershell
        run: |
          $issPath = "setup.iss"
          if (-not (Test-Path $issPath)) {
            Write-Error "Inno Setup script not found: $issPath"
            exit 1
          }

          # Replace version placeholder with actual version
          $ver = "${{ steps.version.outputs.new_version }}"
          $issContent = Get-Content $issPath -Raw -Encoding UTF8
          $issContent = $issContent -replace '#define MyAppVersion "0\.0\.0"', "#define MyAppVersion `"$ver`""
          [System.IO.File]::WriteAllText($issPath, $issContent, (New-Object System.Text.UTF8Encoding $false))
          Write-Host "Patched setup.iss MyAppVersion -> $ver"

          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=${{ steps.version.outputs.new_version }} `
            $issPath `
            /O"output"

          if (-not (Get-ChildItem output/*.exe)) {
            Write-Error "Installer EXE not generated!"
            exit 1
          }

      - name: Get installer EXE info
        id: installer
        shell: powershell
        run: |
          $exeFile = Get-ChildItem output/*.exe | Select-Object -First 1
          $exeName = $exeFile.Name
          $exeSize = $exeFile.Length
          "exe_name=$exeName" >> $env:GITHUB_OUTPUT
          "exe_size=$exeSize" >> $env:GITHUB_OUTPUT
          Write-Host "Installer: $exeName ($exeSize bytes)"

      - name: Generate appcast.xml
        shell: powershell
        run: |
          $ver = "${{ steps.version.outputs.new_version }}"
          $zipSize = "${{ steps.zip.outputs.zip_size }}"
          $repo = "${{ github.repository }}"
          $pubDate = (Get-Date).ToString("ddd, dd MMM yyyy HH:mm:ss zzz", [System.Globalization.CultureInfo]::InvariantCulture)

          $xml = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <rss xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" version="2.0">
            <channel>
              <title>BlackGoldAncientSword</title>
              <link>https://github.com/$repo</link>
              <description>BlackGoldAncientSword Auto Update Feed</description>
              <language>zh-CN</language>
              <item>
                <title>Version $ver</title>
                <sparkle:releaseNotesLink>https://github.com/$repo/releases/tag/v$ver</sparkle:releaseNotesLink>
                <pubDate>$pubDate</pubDate>
                <enclosure
                  url="https://github.com/$repo/releases/download/v$ver/${{ steps.installer.outputs.exe_name }}"
                  sparkle:version="$ver"
                  sparkle:shortVersionString="$ver"
                  length="${{ steps.installer.outputs.exe_size }}"
                  type="application/octet-stream"
                  sparkle:os="windows"
                  sparkle:installerArguments="/SILENT" />
              </item>
            </channel>
          </rss>
          "@

          # Use .NET to write true UTF-8 without BOM (PowerShell 5 Set-Content adds BOM)
          $utf8NoBom = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::WriteAllText("$pwd\output\appcast.xml", $xml.Trim(), $utf8NoBom)
          Write-Host "appcast.xml written ($($xml.Length) chars)"

      - name: Tag & Push
        shell: powershell
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          $ver = "${{ steps.version.outputs.new_version }}"

          $tagExists = git ls-remote --tags origin "refs/tags/v$ver"
          if (-not $tagExists) {
            git tag -a "v$ver" -m "Release v$ver"
            git push origin "v$ver"
            Write-Host "Created and pushed tag v$ver"
          } else {
            Write-Host "Tag v$ver already exists on remote, skipping creation"
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: Release v${{ steps.version.outputs.new_version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            output/*.exe
            output/*.zip
            output/appcast.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
