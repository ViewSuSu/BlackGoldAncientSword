name: Release Build & Publish

on:
  push:
    branches:
      - release


concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Bump version
        id: version
        shell: powershell
        run: |
          $versionFile = "version.json"

          if (-not (Test-Path $versionFile)) {
            Write-Error "version.json file not found!"
            exit 1
          }

          $json = Get-Content $versionFile -Raw | ConvertFrom-Json
          $current = [Version]$json.version

          $newVersion = "{0}.{1}.{2}" -f `
            $current.Major, `
            $current.Minor, `
            ($current.Build + 1)

          $json.version = $newVersion

          $json |
            ConvertTo-Json -Depth 10 |
            Set-Content $versionFile -Encoding UTF8

          Write-Host "Bumped version: $($current.ToString()) -> $newVersion"

          "new_version=$newVersion" >> $env:GITHUB_OUTPUT

      - name: Build (separate DLLs)
        shell: powershell
        run: |
          $projPath = "src/BlackGoldAncientSword.App/BlackGoldAncientSword.App.csproj"

          if (-not (Test-Path $projPath)) {
            Write-Error "Project file not found: $projPath"
            exit 1
          }

          dotnet build $projPath `
            -c Release `
            -r win-x64 `
            -o build/Release `
            /p:Version=${{ steps.version.outputs.new_version }}

      - name: Publish (self-contained)
        shell: powershell
        run: |
          $projPath = "src/BlackGoldAncientSword.App/BlackGoldAncientSword.App.csproj"

          if (-not (Test-Path $projPath)) {
            Write-Error "Project file not found: $projPath"
            exit 1
          }

          dotnet publish $projPath `
            -c Release `
            -r win-x64 `
            -o publish/Release `
            --self-contained `
            /p:PublishSingleFile=true `
            /p:PublishReadyToRun=true `
            /p:Version=${{ steps.version.outputs.new_version }}

      - name: Merge outputs
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path build/Release | Out-Null

          Copy-Item `
            publish/Release/* `
            build/Release/ `
            -Recurse `
            -Force

          Write-Host "Combined build folder contents:"

          Get-ChildItem build/Release |
            Select-Object Name, Length |
            Format-Table -AutoSize

      - name: Zip published output
        id: zip_size
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path output | Out-Null

          $zipName = "BlackGoldAncientSword-v${{ steps.version.outputs.new_version }}.zip"
          $zipPath = "output/$zipName"

          Compress-Archive `
            -Path publish/Release/* `
            -DestinationPath $zipPath `
            -Force

          $zipSize = (Get-Item $zipPath).Length

          "zip_size=$zipSize" >> $env:GITHUB_OUTPUT

          Write-Host "Created: $zipPath"
          Write-Host "Size: $zipSize bytes"

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco upgrade chocolatey -y --no-progress
          choco install innosetup -y --no-progress --force

      - name: Build Installer
        shell: powershell
        run: |
          $issPath = "setup.iss"

          if (-not (Test-Path $issPath)) {
            Write-Error "Inno Setup script not found: $issPath"
            exit 1
          }

          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=${{ steps.version.outputs.new_version }} `
            $issPath `
            /O"output"

          $exeFiles = Get-ChildItem output/*.exe

          if (-not $exeFiles) {
            Write-Error "Installer EXE not generated!"
            exit 1
          }

      - name: Generate appcast.xml
        shell: powershell
        run: |
          $ver = "${{ steps.version.outputs.new_version }}"
          $zipSize = "${{ steps.zip_size.outputs.zip_size }}"
          $repo = "${{ github.repository }}"

          $pubDate = Get-Date -Format "ddd, dd MMM yyyy HH:mm:ss zzz"

          $xml = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <rss xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" version="2.0">
            <channel>
              <title>BlackGoldAncientSword</title>
              <link>https://github.com/$repo</link>
              <description>BlackGoldAncientSword Auto Update Feed</description>
              <language>en</language>

              <item>
                <title>Version $ver</title>

                <sparkle:releaseNotesLink>
                  https://github.com/$repo/releases/tag/v$ver
                </sparkle:releaseNotesLink>

                <pubDate>$pubDate</pubDate>

                <enclosure
                  url="https://github.com/$repo/releases/download/v$ver/BlackGoldAncientSword-v$ver.zip"
                  sparkle:version="$ver"
                  length="$zipSize"
                  type="application/zip"
                  sparkle:os="windows" />
              </item>
            </channel>
          </rss>
          "@

          $xml.Trim() |
            Set-Content `
            -Path "output/appcast.xml" `
            -Encoding UTF8 `
            -Force

      - name: Commit version bump, Tag & Push
        shell: powershell
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          $ver = "${{ steps.version.outputs.new_version }}"

          git add version.json

          git diff --cached --quiet

          if ($LASTEXITCODE -ne 0) {
            git commit -m "chore: bump version to $ver [skip ci]"

            # Pull latest release branch before pushing to avoid rejection
            git pull --rebase origin release
            git push origin HEAD:release
          }

          # Only create and push tag if it doesn't already exist on remote
          $tagExists = git ls-remote --tags origin "refs/tags/v$ver"
          if (-not $tagExists) {
            git tag -a "v$ver" -m "Release v$ver"
            git push origin "v$ver"
          }
          else {
            Write-Host "Tag v$ver already exists on remote, skipping tag creation"
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: Release v${{ steps.version.outputs.new_version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            output/*.exe
            output/*.zip
            output/appcast.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}