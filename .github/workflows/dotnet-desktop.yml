name: Release Build & Publish

on:
  push:
    branches: [ "release" ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "10.0.x"

    - name: Install NBGV
      run: dotnet tool install -g nbgv

    - name: Get version
      id: version
      shell: powershell
      run: |
        $ver = nbgv get-version -v Version
        Write-Host "Build version: $ver"
        echo "new_version=$ver" >> $env:GITHUB_OUTPUT

    - name: Build (separate DLLs)
      shell: powershell
      run: |
        dotnet build src/BlackGoldAncientSword.App/BlackGoldAncientSword.App.csproj `
          -c Release `
          -r win-x64 `
          -o build/Release

    - name: Publish (self-contained single exe)
      shell: powershell
      run: |
        dotnet publish src/BlackGoldAncientSword.App/BlackGoldAncientSword.App.csproj `
          -c Release `
          -r win-x64 `
          -o publish/Release

    - name: Merge outputs
      shell: powershell
      run: |
        Copy-Item publish/Release/* build/Release/ -Recurse -Force
        Write-Host "Combined build folder contents:"
        Get-ChildItem build/Release | Select-Object Name, Length | Format-Table -AutoSize

    - name: Install Inno Setup
      shell: powershell
      run: |
        choco install innosetup -y

    - name: Build Installer
      shell: powershell
      run: |
        [xml]$csproj = Get-Content src/BlackGoldAncientSword.App/BlackGoldAncientSword.App.csproj -Encoding UTF8
        $authors = $csproj.Project.PropertyGroup.Authors
        $url = $csproj.Project.PropertyGroup.PackageProjectUrl
        $ver = '${{ steps.version.outputs.new_version }}'
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$ver" "/DMyAppPublisher=$authors" "/DMyAppURL=$url" setup.iss

    - name: Tag
      shell: powershell
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        $tag = "v${{ steps.version.outputs.new_version }}"
        git tag $tag
        git push origin $tag

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.new_version }}
        name: v${{ steps.version.outputs.new_version }}
        files: |
          output/*.exe
        draft: false
        prerelease: false
