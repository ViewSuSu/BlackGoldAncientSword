name: Release Build & Publish

on:
  push:
    branches: [ "release" ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "10.0.x"

    - name: Install NBGV
      run: dotnet tool install -g nbgv

    - name: Get version
      id: version
      shell: powershell
      run: |
        $ver = nbgv get-version -v SimpleVersion
        Write-Host "Release version: $ver"
        echo "new_version=$ver" >> $env:GITHUB_OUTPUT

    - name: Read project metadata
      id: meta
      shell: powershell
      run: |
        [xml]$csproj = Get-Content src/BlackGoldAncientSword.App/BlackGoldAncientSword.App.csproj
        $authors = $csproj.Project.PropertyGroup.Authors
        $url = $csproj.Project.PropertyGroup.PackageProjectUrl
        Write-Host "Authors: $authors"
        Write-Host "URL: $url"
        echo "authors=$authors" >> $env:GITHUB_OUTPUT
        echo "url=$url" >> $env:GITHUB_OUTPUT

    - name: Publish (no single-file)
      shell: powershell
      run: |
        dotnet publish src/BlackGoldAncientSword.App/BlackGoldAncientSword.App.csproj `
          -c Release `
          -r win-x64 `
          --self-contained `
          /p:PublishSingleFile=false `
          -o publish/Release

    - name: Install Inno Setup
      shell: powershell
      run: |
        choco install innosetup -y

    - name: Build Installer
      shell: cmd
      run: |
        "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.version.outputs.new_version }} /DMyAppPublisher=${{ steps.meta.outputs.authors }} /DMyAppURL=${{ steps.meta.outputs.url }} setup.iss

    - name: Tag
      shell: powershell
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        $tag = "v${{ steps.version.outputs.new_version }}"
        git tag $tag
        git push origin $tag

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.new_version }}
        name: v${{ steps.version.outputs.new_version }}
        files: |
          output/*.exe
        draft: false
        prerelease: false