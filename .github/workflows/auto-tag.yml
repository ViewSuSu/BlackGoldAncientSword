name: Auto Tag on Release

on:
  push:
    branches:
      - release

jobs:
  tag:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install NBGV
        run: dotnet tool install -g nbgv

      - name: Get version
        id: version
        shell: powershell
        run: |
          $ver = nbgv get-version -v SimpleVersion
          Write-Host "Release version: $ver"
          echo "new_version=$ver" >> $env:GITHUB_OUTPUT

      - name: Publish Release build
        shell: powershell
        run: |
          dotnet publish src/BlackGoldAncientSword.App/BlackGoldAncientSword.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained `
            -o publish/Release

      - name: Tag
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          $tag = "v${{ steps.version.outputs.new_version }}"
          git tag $tag
          git push origin $tag

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: v${{ steps.version.outputs.new_version }}
          files: |
            publish/Release/BlackGoldAncientSword.App.exe
          draft: false
          prerelease: false