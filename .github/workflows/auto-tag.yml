name: Auto Tag on Release

on:
  push:
    branches:
      - release

jobs:
  tag:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install NBGV
        run: dotnet tool install -g nbgv

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: bump
        shell: powershell
        run: |
          $ver = nbgv get-version -v SimpleVersion
          Write-Host "Current version: $ver"
          $parts = $ver -split '\.'
          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $patch = [int]$parts[2] + 1
          $newVer = "$major.$minor.$patch"
          Write-Host "New version: $newVer"

          $json = Get-Content version.json -Raw | ConvertFrom-Json
          $json.version = $newVer
          $json | ConvertTo-Json -Depth 10 | Set-Content version.json -Encoding UTF8

          git add version.json
          git commit -m "Set version to '$newVer'"
          echo "new_version=$newVer" >> $env:GITHUB_OUTPUT

      - name: Tag and push
        shell: powershell
        run: |
          git push origin release
          $tag = "v${{ steps.bump.outputs.new_version }}"
          git tag $tag
          git push origin $tag